<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadership Assessment | Planet Ganges</title>
    <!-- Tailwind for the "clean, mobile-friendly" requirement -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden {
            display: none;
        }

        /* Custom radio styling for a better Likert scale experience */
        input[type="radio"]:checked+span {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased">

    <div class="max-w-3xl mx-auto py-12 px-6">
        <!-- Header Section -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-indigo-900 tracking-tight">Leadership Assessment</h1>
            <p class="mt-4 text-lg text-gray-600">Complete this 9-question assessment to receive your personalized
                leadership profile.</p>
        </header>

        <!-- Main Assessment Form -->
        <form id="assessmentForm" class="bg-white shadow-xl rounded-2xl p-8 border border-gray-100">

            <!-- User Information -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 pb-8 border-b border-gray-100">
                <div>
                    <label for="name" class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label for="email" class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
            </div>

            <!-- Dimensions & Questions Container -->
            <div id="questionsWrapper" class="space-y-12">
                <!-- Injected via JavaScript below -->
            </div>

            <!-- Submit Action -->
            <div class="mt-12">
                <button type="submit" id="submitBtn" disabled
                    class="w-full bg-gray-400 text-white text-lg font-bold py-4 rounded-xl cursor-not-allowed transition shadow-lg">
                    Submit Assessment
                </button>
                <p id="errorMessage" class="text-red-500 text-center mt-4 hidden font-medium"></p>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
